<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavor Dashboard</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

:root {
  --bg: #080612; --card: #111124; --border: rgba(192,132,252,0.18);
  --text: #e8e8f0; --dim: #9988bb; --muted: #7766aa;
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
  --purple: #c084fc; --blue: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }
.wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }
h1 { font-size: 1.4rem; font-weight: 900; margin-bottom: 4px; }
.subtitle { color: var(--muted); font-size: 0.8rem; margin-bottom: 24px; }

/* Auth */
.auth-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; margin-top: 80px; }
.auth-box input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; margin: 16px 0; font-family: monospace; }
.auth-box button { padding: 12px 32px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }

/* Stats grid */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
.stat-num { font-size: 1.8rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

/* Sections */
.section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
.section-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }

/* Domain accuracy */
.domain-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.domain-name { width: 70px; font-size: 0.8rem; font-weight: 600; text-align: right; }
.domain-bar-wrap { flex: 1; height: 24px; background: rgba(255,255,255,0.03); border-radius: 6px; position: relative; overflow: hidden; }
.domain-bar { height: 100%; border-radius: 6px; transition: width 0.6s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 0.7rem; font-weight: 700; }
.domain-count { width: 50px; font-size: 0.7rem; color: var(--dim); text-align: right; }

/* Quiz breakdown */
.quiz-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.quiz-row:last-child { border-bottom: none; }
.quiz-name { font-size: 0.82rem; font-weight: 600; }
.quiz-count { font-size: 0.82rem; color: var(--dim); font-weight: 700; }

/* Timeline */
.timeline-row { display: flex; align-items: flex-end; gap: 2px; height: 80px; padding: 0 4px; }
.timeline-bar { flex: 1; min-width: 6px; background: var(--purple); border-radius: 3px 3px 0 0; transition: height 0.4s; position: relative; }
.timeline-bar:hover::after { content: attr(data-label); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; white-space: nowrap; z-index: 10; }
.timeline-labels { display: flex; gap: 2px; padding: 4px 4px 0; }
.timeline-labels span { flex: 1; text-align: center; font-size: 0.55rem; color: var(--muted); min-width: 6px; }

/* User distribution */
.hist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.hist-label { width: 50px; font-size: 0.75rem; color: var(--dim); text-align: right; }
.hist-bar-wrap { flex: 1; height: 20px; background: rgba(255,255,255,0.03); border-radius: 4px; overflow: hidden; }
.hist-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 0.65rem; font-weight: 700; }
.hist-count { width: 30px; font-size: 0.7rem; color: var(--dim); }

/* Recent */
.recent-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
.recent-row:last-child { border-bottom: none; }
.recent-name { font-weight: 700; }
.recent-quiz { color: var(--dim); font-size: 0.7rem; }
.recent-time { color: var(--muted); font-size: 0.72rem; }

/* Refresh */
.refresh-btn { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--dim); font-size: 0.8rem; cursor: pointer; font-family: inherit; }
.refresh-btn:hover { border-color: var(--purple); color: var(--purple); }

.loading { text-align: center; padding: 60px; color: var(--muted); }

@media (max-width: 640px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
}

/* ═══════════════════════════════════════════
   Aurora Glassmorphism Theme (2025)
   ═══════════════════════════════════════════ */

/* Aurora 그라디언트 배경 레이어 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(ellipse 90% 60% at -10% 0%,  rgba(120, 40, 200, 0.55) 0%, transparent 55%),
    radial-gradient(ellipse 70% 80% at 110% 0%,  rgba(236, 72, 153, 0.45) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 20%  110%, rgba(34, 211, 238, 0.25) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 85%  85%,  rgba(120, 40, 200, 0.35) 0%, transparent 55%);
  animation: auroraFloat 16s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes auroraFloat {
  0%   { transform: scale(1)    translate(0%,   0%)   rotate(0deg); }
  33%  { transform: scale(1.06) translate(-3%,  1.5%) rotate(1deg); }
  66%  { transform: scale(0.97) translate(2%,  -1%)   rotate(-1deg); }
  100% { transform: scale(1.08) translate(-2%,  3%)   rotate(2deg); }
}
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen" class="wrap">
  <div class="auth-box">
    <h1>Flavor Dashboard</h1>
    <p style="color:var(--dim);margin-top:8px;">Admin 토큰을 입력하세요</p>
    <input type="password" id="token-input" placeholder="Bearer token" onkeydown="if(event.key==='Enter')doAuth()">
    <br><button onclick="doAuth()">접속</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="wrap" style="display:none;">
  <h1>Flavor Dashboard</h1>
  <div class="subtitle" id="last-updated"></div>

  <div class="stats" id="stats-grid"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div class="section">
      <div class="section-title">Domain Accuracy</div>
      <div id="domain-accuracy"></div>
    </div>
    <div class="section">
      <div class="section-title">Quiz Breakdown</div>
      <div id="quiz-breakdown"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Daily Submissions</div>
    <div class="timeline-row" id="timeline"></div>
    <div class="timeline-labels" id="timeline-labels"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div class="section">
      <div class="section-title">User Accuracy Distribution</div>
      <div id="user-dist"></div>
    </div>
    <div class="section">
      <div class="section-title">Recent Submissions</div>
      <div id="recent"></div>
    </div>
  </div>

  <button class="refresh-btn" onclick="loadData()">Refresh</button>
</div>

<script>
const API = window.location.origin;
let TOKEN = '';

function doAuth() {
  TOKEN = document.getElementById('token-input').value.trim();
  if (!TOKEN) return;
  localStorage.setItem('flavor_admin_token', TOKEN);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
}

// Auto-login if token saved
(function() {
  const saved = localStorage.getItem('flavor_admin_token');
  if (saved) { TOKEN = saved; doAuth(); }
})();

async function apiFetch(table, limit=5000) {
  const resp = await fetch(`${API}/api/admin/export?table=${table}&limit=${limit}`, {
    headers: { 'Authorization': `Bearer ${TOKEN}` }
  });
  if (resp.status === 403) {
    localStorage.removeItem('flavor_admin_token');
    location.reload();
    return null;
  }
  return resp.json();
}

async function loadData() {
  const [subData, fbData] = await Promise.all([
    apiFetch('submissions'), apiFetch('feedbacks')
  ]);
  if (!subData || !fbData) return;

  const subs = subData.data;
  const fbs = fbData.data;

  document.getElementById('last-updated').textContent =
    `Updated: ${new Date().toLocaleString('ko-KR')} | ${subs.length} submissions, ${fbs.length} feedbacks`;

  renderStats(subs, fbs);
  renderDomainAccuracy(fbs);
  renderQuizBreakdown(subs);
  renderTimeline(subs);
  renderUserDist(fbs);
  renderRecent(subs);
}

function renderStats(subs, fbs) {
  const up = fbs.filter(f => f.thumb === 1).length;
  const acc = fbs.length > 0 ? (up / fbs.length * 100).toFixed(1) : '-';
  const uniqueUsers = new Set(fbs.map(f => f.submission_id)).size;

  const today = new Date().toISOString().slice(0, 10);
  const todaySubs = subs.filter(s => s.created_at && s.created_at.startsWith(today)).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat"><div class="stat-num">${subs.length}</div><div class="stat-label">Total Subs</div></div>
    <div class="stat"><div class="stat-num">${fbs.length}</div><div class="stat-label">Feedbacks</div></div>
    <div class="stat"><div class="stat-num" style="color:${parseFloat(acc)>=70?'var(--green)':'var(--amber)'}">${acc}%</div><div class="stat-label">Accuracy</div></div>
    <div class="stat"><div class="stat-num">${todaySubs}</div><div class="stat-label">Today</div></div>
  `;
}

function renderDomainAccuracy(fbs) {
  const domains = {};
  fbs.forEach(f => {
    if (!domains[f.domain]) domains[f.domain] = { up: 0, down: 0 };
    if (f.thumb === 1) domains[f.domain].up++;
    else domains[f.domain].down++;
  });

  const sorted = Object.entries(domains).sort((a, b) => {
    const accA = a[1].up / (a[1].up + a[1].down);
    const accB = b[1].up / (b[1].up + b[1].down);
    return accB - accA;
  });

  const el = document.getElementById('domain-accuracy');
  if (sorted.length === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;">No feedback data yet</div>'; return; }

  el.innerHTML = sorted.map(([domain, s]) => {
    const total = s.up + s.down;
    const acc = (s.up / total * 100);
    const color = acc >= 80 ? 'var(--green)' : acc >= 60 ? 'var(--amber)' : 'var(--red)';
    return `<div class="domain-row">
      <div class="domain-name">${domain}</div>
      <div class="domain-bar-wrap"><div class="domain-bar" style="width:${acc}%;background:${color};">${acc.toFixed(0)}%</div></div>
      <div class="domain-count">${s.up}/${total}</div>
    </div>`;
  }).join('');
}

function renderQuizBreakdown(subs) {
  const quizzes = {};
  subs.forEach(s => {
    const v = s.profile_version || 'unknown';
    const qt = v.replace(/^0\.1_/, '').replace(/^1\.2_?/, 'v1.2 ').replace(/^None$/, 'unknown');
    quizzes[qt] = (quizzes[qt] || 0) + 1;
  });

  const sorted = Object.entries(quizzes).sort((a, b) => b[1] - a[1]);
  document.getElementById('quiz-breakdown').innerHTML = sorted.map(([name, count]) =>
    `<div class="quiz-row"><span class="quiz-name">${name}</span><span class="quiz-count">${count}</span></div>`
  ).join('');
}

function renderTimeline(subs) {
  const days = {};
  subs.forEach(s => {
    const d = (s.created_at || '').slice(0, 10);
    if (d) days[d] = (days[d] || 0) + 1;
  });

  const sortedDays = Object.keys(days).sort();
  if (sortedDays.length === 0) return;

  // Fill gaps
  const start = new Date(sortedDays[0]);
  const end = new Date(sortedDays[sortedDays.length - 1]);
  const allDays = [];
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const key = d.toISOString().slice(0, 10);
    allDays.push({ date: key, count: days[key] || 0 });
  }

  // Show last 30 days max
  const recent = allDays.slice(-30);
  const maxCount = Math.max(...recent.map(d => d.count), 1);

  document.getElementById('timeline').innerHTML = recent.map(d => {
    const h = Math.max(2, d.count / maxCount * 100);
    return `<div class="timeline-bar" style="height:${h}%" data-label="${d.date.slice(5)}: ${d.count}"></div>`;
  }).join('');

  document.getElementById('timeline-labels').innerHTML = recent.map((d, i) => {
    if (recent.length <= 15 || i % Math.ceil(recent.length / 10) === 0)
      return `<span>${d.date.slice(5)}</span>`;
    return `<span></span>`;
  }).join('');
}

function renderUserDist(fbs) {
  const users = {};
  fbs.forEach(f => {
    if (!users[f.submission_id]) users[f.submission_id] = { up: 0, total: 0 };
    users[f.submission_id].total++;
    if (f.thumb === 1) users[f.submission_id].up++;
  });

  const accs = Object.values(users).map(u => u.up / u.total * 100);
  if (accs.length === 0) {
    document.getElementById('user-dist').innerHTML = '<div style="color:var(--muted);font-size:0.8rem;">No feedback data yet</div>';
    return;
  }

  const bins = [
    { label: '0-24%', min: 0, max: 25 },
    { label: '25-49%', min: 25, max: 50 },
    { label: '50-74%', min: 50, max: 75 },
    { label: '75-99%', min: 75, max: 100 },
    { label: '100%', min: 100, max: 101 },
  ];

  const maxBin = Math.max(...bins.map(b => accs.filter(a => a >= b.min && a < b.max).length), 1);

  document.getElementById('user-dist').innerHTML = bins.map(b => {
    const count = accs.filter(a => a >= b.min && a < b.max).length;
    const w = count / maxBin * 100;
    const color = b.min >= 75 ? 'var(--green)' : b.min >= 50 ? 'var(--amber)' : 'var(--red)';
    return `<div class="hist-row">
      <div class="hist-label">${b.label}</div>
      <div class="hist-bar-wrap"><div class="hist-bar" style="width:${w}%;background:${color};">${count > 0 ? count : ''}</div></div>
      <div class="hist-count">${count}</div>
    </div>`;
  }).join('');
}

function renderRecent(subs) {
  const recent = subs.slice(-10).reverse();
  document.getElementById('recent').innerHTML = recent.map(s => {
    const qt = (s.profile_version || '').replace(/^0\.1_/, '').replace(/^1\.2_?/, '');
    const time = (s.created_at || '').slice(5, 16).replace('T', ' ');
    return `<div class="recent-row">
      <div><span class="recent-name">${s.name || '?'}</span> <span class="recent-quiz">${qt}</span></div>
      <div class="recent-time">${time}</div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
